name: Docker Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create .env for CI
      shell: bash
      run: |
        set -euo pipefail
        # Use repo example as base (no secrets in it)
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          # Fallback: minimal env so docker compose can start
          cat > .env <<'EOF'
PORT=5000
NODE_ENV=development
DB_HOST=postgres
DB_PORT=5432
DB_USER=postgres
DB_PASSWORD=postgres
DB_NAME=procurepro
WHATSAPP_MOCK_MODE=true
WHATSAPP_API_URL=https://graph.facebook.com/v22.0
WHATSAPP_API_TOKEN=DUMMY
WHATSAPP_PHONE_ID=DUMMY
WHATSAPP_VERIFY_TOKEN=procurepro_verify_token
VITE_API_URL=http://localhost:5001
EOF
        fi

        # Force safe defaults for CI (no real WhatsApp calls)
        {
          echo ""
          echo "# CI overrides"
          echo "WHATSAPP_MOCK_MODE=true"
          echo "WHATSAPP_API_TOKEN=DUMMY"
          echo "WHATSAPP_PHONE_ID=DUMMY"
        } >> .env

        echo "Generated .env:" 
        sed -E 's/(WHATSAPP_API_TOKEN=).*/\1***REDACTED***/' .env | cat

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker images
      run: |
        docker compose build

    - name: Run containers
      run: |
        docker compose up -d

    - name: Wait for backend health
      run: |
        set -e
        for i in {1..30}; do
          if curl -sf http://localhost:5001/api/health > /dev/null; then
            echo "✅ Backend is healthy"
            exit 0
          fi
          echo "⏳ Waiting for backend... ($i/30)"
          sleep 2
        done
        echo "❌ Backend did not become healthy in time"
        docker compose ps || true
        docker compose logs --no-color backend || true
        exit 1

    - name: Cleanup
      if: always()
      run: |
        docker compose down
