services:
  postgres:
    image: postgres:14-alpine
    container_name: procurepro-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-procurepro}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js Backend
  backend:
    build: ./back
    container_name: node-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ${ORDERS_DIR_HOST:-./back/orders}:/orders
    environment:
      NODE_ENV: production
      PORT: 5000
      # DB credentials — must match postgres service above
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: procurepro
      ORDERS_DIR: /orders
      # ONEC_API_KEY: procurepro-1c-secret-key
      # Optional extras from host .env
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_32chars_min}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_32chars_min}
      JWT_EXPIRE: ${JWT_EXPIRE:-1h}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE:-30d}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://82.115.42.79:8083,http://localhost:8083,http://localhost:3000}
      # WhatsApp Cloud API
      WHATSAPP_API_URL: https://graph.facebook.com/v22.0
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID:-1007855415740100}
      WHATSAPP_MOCK_MODE: "false"
      WHATSAPP_VERIFY_TOKEN: procurepro_verify_token
      # Frontend URL for supplier form links in WhatsApp messages
      FRONTEND_URL: ${FRONTEND_URL:-http://82.115.42.79:8083}
      # 1C integration key
      ONEC_API_KEY: ${ONEC_API_KEY:-procurepro-1c-secret-key}
    restart: unless-stopped

  # Frontend (Nginx + static build)
  frontend:
    build:
      context: ./front
      args:
        # Always use nginx proxy — do NOT override this with localhost URLs
        VITE_API_URL: /api
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "8083:80"
    restart: unless-stopped

volumes:
  postgres_data:
