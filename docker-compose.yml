version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: procurepro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: procurepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js Backend
  backend:
    build: ./back
    container_name: node-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ./back:/app
      - ./back/uploads:/app/uploads:ro
      - /app/node_modules
      - ${ORDERS_DIR_HOST:-./back/orders}:/orders
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=procurepro
      - ORDERS_DIR=/orders
    command: npm run dev

  frontend:
    build: ./front
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "5174:5173"
    volumes:
      - ./front:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npm run dev -- --host

volumes:
  postgres_data:
