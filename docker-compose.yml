services:
  postgres:
    image: postgres:14-alpine
    container_name: procurepro-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-procurepro}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js Backend
  backend:
    build: ./back
    container_name: node-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ${ORDERS_DIR_HOST:-./back/orders}:/orders
    environment:
      NODE_ENV: production
      PORT: 5000
      # DB credentials — must match postgres service above
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: procurepro
      ORDERS_DIR: /orders
      # Optional extras from host .env
      JWT_SECRET: ${JWT_SECRET:-changeme_jwt_secret_32chars_min}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://82.115.42.79:8083,http://localhost:8083,http://localhost:3000}
    restart: unless-stopped

  # Frontend (Nginx + static build)
  frontend:
    build:
      context: ./front
      args:
        # Always use nginx proxy — do NOT override this with localhost URLs
        VITE_API_URL: /api
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "8083:80"
    restart: unless-stopped

volumes:
  postgres_data:
