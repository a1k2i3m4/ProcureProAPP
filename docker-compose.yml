version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: procurepro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: procurepro
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js Backend
  backend:
    build: ./back
    container_name: node-backend
    depends_on:
      postgres:
        condition: service_healthy
    # наружу можно не публиковать (Nginx проксирует /api),
    # но оставим для отладки по желанию.
    ports:
      - "5001:5000"
    volumes:
      # uploads читаем из образа/контейнера, при необходимости можно смонтировать
      # - ./back/uploads:/app/uploads:ro
      - ${ORDERS_DIR_HOST:-./back/orders}:/orders
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=procurepro
      - ORDERS_DIR=/orders
    restart: unless-stopped

  # Frontend (Nginx + static build)
  frontend:
    build: ./front
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
