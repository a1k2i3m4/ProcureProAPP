services:
  postgres:
    image: postgres:14-alpine
    container_name: procurepro-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-procurepro}
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Node.js Backend
  backend:
    build: ./back
    container_name: node-backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    volumes:
      - ${ORDERS_DIR_HOST:-./back/orders}:/orders
    env_file: ./.env
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-${POSTGRES_USER:-postgres}}
      DB_PASSWORD: ${DB_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}
      DB_NAME: ${DB_NAME:-${POSTGRES_DB:-procurepro}}
      ORDERS_DIR: /orders
    restart: unless-stopped

  # Frontend (Nginx + static build)
  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: react-frontend
    depends_on:
      - backend
    ports:
      - "8083:80"
    restart: unless-stopped

volumes:
  postgres_data:
